services:
  mongodb:
    image: mongo:8.0
    container_name: attendance-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: attendance-geotag
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - attendance-network

  backend:
    build: ./backend
    container_name: attendance-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/attendance-geotag
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_EXPIRE: 7d
      ADMIN_SECRET: ${ADMIN_SECRET:-create-admin-secret}
      
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-cloudinary}
      
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      
      MONGODB_POOL_MAX: ${MONGODB_POOL_MAX:-300}
      MONGODB_POOL_MIN: ${MONGODB_POOL_MIN:-20}
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:5000/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - attendance-network

  admin-frontend:
    build: ./frontend/admin
    container_name: attendance-admin
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - attendance-network

  student-frontend:
    build: ./frontend/student
    container_name: attendance-student
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - attendance-network

  ngrok:
    image: ngrok/ngrok:latest
    container_name: attendance-ngrok
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "backend:5000"
      - "--url=${NGROK_DOMAIN}"
    ports:
      - "4040:4040"
    networks:
      - attendance-network
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - ngrok

volumes:
  mongodb_data:

networks:
  attendance-network:
    driver: bridge
