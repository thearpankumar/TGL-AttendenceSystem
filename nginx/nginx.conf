worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml;
    
    client_max_body_size 20M;
    
    # Upstream servers
    upstream backend {
        server backend:5000;
    }
    
    upstream admin_frontend {
        server admin-frontend:80;
    }
    
    upstream student_frontend {
        server student-frontend:80;
    }
    
    server {
        listen 80;
        server_name localhost 127.0.0.1 *.ngrok-free.dev *.ngrok.io;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Bypass ngrok browser warning interstitial page
        add_header ngrok-skip-browser-warning "true" always;
        
        # === API ROUTES ===
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }
        
        location /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }
        
        # === STORAGE INFO ===
        location /api/storage-info {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }
        
        # === ADMIN PANEL ===
        # Exact /admin path
        location = /admin {
            proxy_pass http://admin_frontend/index.html;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # All /admin/* sub-routes — serve index.html for React Router
        location /admin/ {
            proxy_pass http://admin_frontend/index.html;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /assets/ {
            proxy_pass http://admin_frontend/assets/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # === STUDENT PAGE - /attend/:token ===
        location /attend/ {
            rewrite ^/attend/(.*)$ /$1 break;
            proxy_pass http://student_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Disable caching
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            expires off;
        }
        
        # === 32-character hex token redirect to /attend/:token ===
        if ($request_uri ~ "^/([a-f0-9]{32})$") {
            return 301 /attend/$1;
        }
        
        # === ROOT ===
        location = / {
            return 301 /admin;
        }

        # === DASHBOARD ROUTES — redirect into /admin (React Router handles internally) ===
        location ~ ^/dashboard {
            return 301 /admin;
        }

        # === STUDENT PAGE DIRECT ===
        location = /student {
            proxy_pass http://student_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # === STUDENT STATIC ASSETS (root-relative JS/CSS) ===
        location = /app.js {
            proxy_pass http://student_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Disable caching
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            expires off;
        }

        # === FAVICON ===
        location = /favicon.ico {
            return 204;
            access_log off;
            log_not_found off;
        }
    }
}
