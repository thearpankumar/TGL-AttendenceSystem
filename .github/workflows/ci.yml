name: CI Pipeline

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  backend-rust-test:
    name: Backend Rust Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-rust
    env:
      RUSTC_WRAPPER: "sccache"
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend-rust

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run clippy
        run: cargo clippy -- -D warnings
        env:
          CARGO_INCREMENTAL: 0

      - name: Run tests
        run: |
          cargo nextest run --locked --all-features
          cargo test --doc --locked --all-features
        env:
          CARGO_INCREMENTAL: 0

  frontend-admin-test:
    name: Frontend Admin Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/admin

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-admin-coverage
          path: frontend/admin/coverage/
          retention-days: 7

  frontend-student-test:
    name: Frontend Student Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/student

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/student/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-student-coverage
          path: frontend/student/coverage/
          retention-days: 7

  frontend-home-test:
    name: Frontend Home Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/home

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linting
        run: bun run lint

      - name: Run typecheck
        run: bun run typecheck

      - name: Run build
        run: bun run build

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit backend-rust dependencies
        run: |
          cd backend-rust
          cargo audit
        continue-on-error: false

      - name: Audit frontend/admin dependencies
        run: |
          cd frontend/admin
          echo "=== Frontend Admin Security Audit ==="
          npm audit --audit-level=high
        continue-on-error: false

      - name: Audit frontend/student dependencies
        run: |
          cd frontend/student
          echo "=== Frontend Student Security Audit ==="
          npm audit --audit-level=high
        continue-on-error: false

      - name: Setup Bun for home audit
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Audit frontend/home dependencies
        run: |
          cd frontend/home
          echo "=== Frontend Home Security Audit ==="
          bun audit --audit-level=high
        continue-on-error: false

  ci-status:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [backend-rust-test, frontend-admin-test, frontend-student-test, frontend-home-test, security-audit]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.backend-rust-test.result }}" != "success" ] || \
             [ "${{ needs.frontend-admin-test.result }}" != "success" ] || \
             [ "${{ needs.frontend-student-test.result }}" != "success" ] || \
             [ "${{ needs.frontend-home-test.result }}" != "success" ] || \
             [ "${{ needs.security-audit.result }}" != "success" ]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed successfully!"
