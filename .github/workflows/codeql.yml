name: CodeQL Security Analysis

on:
  push:
    branches: [master]
    paths:
      - 'backend/**/*.js'
      - 'frontend/admin/src/**/*.{js,jsx}'
      - 'frontend/student/src/**/*.{js,jsx,ts,tsx}'
      - 'frontend/home/src/**/*.{ts,tsx}'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: [master]
    paths:
      - 'backend/**/*.js'
      - 'frontend/admin/src/**/*.{js,jsx}'
      - 'frontend/student/src/**/*.{js,jsx,ts,tsx}'
      - 'frontend/home/src/**/*.{ts,tsx}'
      - '.github/workflows/codeql.yml'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
