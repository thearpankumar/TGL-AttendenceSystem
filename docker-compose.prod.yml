# Production "app" stack: redis, backend, and the two frontends.
# MongoDB and Caddy/fail2ban live in their own files on purpose (so routine
# app work here never has the DB/proxy config in view) — always run all
# three together:
#   docker compose -f docker-compose.prod.yml -f docker-compose.mongo.yml -f docker-compose.caddy.yml up -d --build

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "3"

services:

  redis:
    image: redis:7-alpine
    container_name: attendance-redis
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-redis_secure_password}
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - db-net

  
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=5000
      - MONGODB_URI=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/attendance-geotag?replicaSet=rs0
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=7d
      - ADMIN_SECRET=${ADMIN_SECRET}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-s3}
      # Cloudinary
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      # AWS S3
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      # WebAuthn
      - WEBAUTHN_RP_NAME=${WEBAUTHN_RP_NAME:-Attendix Attendance System}
      - WEBAUTHN_RP_ID=${WEBAUTHN_RP_ID:-xenkrypt.in}
      - WEBAUTHN_ORIGIN=${WEBAUTHN_ORIGIN:-https://xenkrypt.in}
      # Database Pool
      - MONGODB_POOL_MAX=${MONGODB_POOL_MAX:-300}
      - MONGODB_POOL_MIN=${MONGODB_POOL_MIN:-20}
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
      mongo3:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - db-net
      - web-net

  
  admin-frontend:
    build:
      context: ./frontend/admin
      args:
        VITE_BASE_PATH: /owner-of-attendix-xyz/
    restart: unless-stopped
    logging: *default-logging
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    depends_on:
      - backend
    networks:
      - web-net

  
  student-frontend:
    build:
      context: ./frontend/student
      args:
        VITE_BYPASS_MOBILE_CHECK: ${VITE_BYPASS_MOBILE_CHECK:-false}
    restart: unless-stopped
    logging: *default-logging
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    depends_on:
      - backend
    networks:
      - web-net


  home-frontend:
    build:
      context: ./frontend/home
    restart: unless-stopped
    logging: *default-logging
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - web-net

volumes:
  redis_data:

networks:
  db-net:
    driver: bridge
  web-net:
    driver: bridge
