global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Per-container CPU/memory/network — works out of the box, no app code needed.
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  # Host-level CPU/memory/disk — works out of the box, no app code needed.
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  # Caddy's built-in Prometheus metrics (needs `servers { metrics }` + a
  # network-reachable `admin` listener in the Caddyfile — already set).
  - job_name: caddy
    metrics_path: /metrics
    static_configs:
      - targets: ['caddy:2019']

  # Backend Node.js metrics via prom-client (/metrics endpoint added in server.js).
  # Uses dns_sd_configs so ALL 3 replicas (deploy.replicas: 3) are scraped
  # individually rather than only whichever replica Docker's round-robin DNS
  # resolves first from a static_configs target.
  - job_name: backend
    dns_sd_configs:
      - names: ['backend']
        type: A
        port: 5000
    metrics_path: /metrics
    relabel_configs:
      # Tag each replica's metrics with its resolved IP address.
      - source_labels: [__address__]
        target_label: instance
